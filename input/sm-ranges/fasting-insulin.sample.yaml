reviewer_note: |
  Population-RI only; no guideline anchor exists. RI is wide (e.g., male
  18-50: 2.2-24.1 μIU/mL) because the healthy-adult population includes
  individuals across the insulin-resistance spectrum. MO frameworks (Kraft,
  Bikman, Naiman) target <5-10 μIU/mL and sit inside the lower quartile of
  the RI; this is paradigm divergence, not contradiction. crosscheck_status
  is `not_performed`; independent revalidation is required before any row
  is promoted to display.
