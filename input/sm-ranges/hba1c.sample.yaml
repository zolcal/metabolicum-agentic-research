reviewer_note: |
  Doctrine: population-RI primary, guidelines annotation-only. The RI is
  wide (e.g., male 18-50: 4.6-7.4%) because the underlying healthy-adult
  population retains members with elevated HbA1c. ADA clinical cutoffs
  (5.7/6.5%) are annotations, not the SM range itself. MO frameworks
  targeting <5.4-5.6% sit inside the lower half of the RI.
