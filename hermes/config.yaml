# hermes/config.yaml — Metabolicum cloud-only worker profile
# Default: DashScope Qwen 3.7 Max. Local Qwen disabled.

model:
  provider: "alibaba"
  default: "qwen3.7-max"
  context_length: 1000000



display:
  inline_diffs: false
  file_mutation_verifier: false

memory:
  memory_enabled: false
  user_profile_enabled: false
  memory_char_limit: 0
  user_char_limit: 0
  provider: ""

agent:
  disabled_toolsets:
    - memory
    - skills
    - cronjob
    - messaging
  max_turns: 50

skills:
  guard_agent_created: true

terminal:
  backend: local
  persistent_shell: false
  timeout: 120

display:
  tool_progress: all
  show_cost: true
  streaming: false

compression:
  enabled: false

delegation:
  max_concurrent_children: 4
  max_spawn_depth: 2
  orchestrator_enabled: true

worktree: false

approvals:
  mode: "off"

browser:
  inactivity_timeout: 300
  command_timeout: 60

code_execution:
  max_tool_calls: 25
  timeout: 120
