# ─── research_studies ────────────────────────────────────────────────────────
# Reference-library entries. One per resolved PMID or DOI cited in any MO
# narrative section or supporting any MO range_fact. Slug is deterministic
# (`pmid-<id>` preferred when PMID exists).
research_studies:
  - slug: <TBD: e.g. "pmid-12345678">
    pmid: <TBD>
    doi: <TBD>
    original_title: <TBD: exact title from PubMed/Crossref>
    authors_short: <TBD: e.g. "Smith J, et al.">
    journal: <TBD>
    publication_year: <TBD>
    study_type: <TBD: rct | cohort | meta_analysis | review | etc.>
    evidence_grade: <TBD: parent letter>
    evidence_sub_grade: <TBD: full code>
    sample_size: <TBD>
    grading_confidence: <TBD: low | medium | high>
    auto_graded: false
    paradigm_standard: false
    paradigm_research: false
    paradigm_optimization: true
    pubmed_url: <TBD>
    doi_url: <TBD>
    full_text_url: <TBD: only if PMC OA Commercial-Use-Allowed subset>
