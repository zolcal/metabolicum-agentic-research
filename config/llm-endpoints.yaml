# LLM endpoint configuration for Hermes.
#
# Policy
#   - Default to local Gemma 4 26B-A4B via Lucebox DFlash. Free, 120-220 tok/s.
#   - Cloud council uses OpenRouter (single API key, multiple families).
#   - Council picks the minimum viable model in each family for the spike;
#     promote to flagship tier only if quality issues surface during the pilot.
#
# Role taxonomy (post Codex/Kimi review 2026-05-21):
#   Stage-2 work (one source → many claims per source):
#     extractor              — verbatim claim extraction
#     tagger                 — marker-tag attachment
#     structurer             — population qualifier + units structuring
#   Stage-3 council (per spec §05 — three distinct families required):
#     council_extractor      — re-extracts the claim from the source URL fresh
#     council_reviewer       — checks verbatim quote, SM-anchor sanity
#     council_decider        — assigns evidence sub-grade, consensus, paradigm
#   Stage-5 legal:
#     legal_reviewer         — applies §07 quote-length, license, ToS rules
#   Stage-1 discovery:
#     embedding              — semantic ranking of candidate sources
#   Failover:
#     extractor_backup       — used only when `extractor` endpoint fails
#
# Three-family council assignment (sign-off pass):
#   council_extractor → deepseek-direct-chat (DeepSeek family, native API — not OpenRouter)
#   council_reviewer  → openrouter-reviewer (Google family)
#   council_decider   → openrouter-decider  (OpenAI family)
#
# Schema fields (each endpoint):
#   base_url            OpenAI-compatible base URL
#   api_key_env         env var name (empty for localhost endpoints)
#   model               model id to send in request body
#   family              qwen | google | openai | anthropic | deepseek | mistral | moonshot | zhipu
#   api_style           openai_compatible (default) | gemini
#   active              true if wired into a live role; false = reserve
#   roles               list of roles this endpoint handles
#   timeout_s           request timeout (adapter enforces via httpx.Timeout)
#   default_max_tokens  sensible default if caller doesn't specify max_tokens.
#                       Prevents the 32-token footgun where Qwen / gpt-5-mini
#                       burn all tokens on internal reasoning and return empty.
#   min_output_tokens   enforced minimum (gpt-5 family reserves capacity)
#   max_context         target context window (tokens)
#   supports_json_schema  true if endpoint enforces JSON Schema decoding
#   cost_per_million_in/out  USD, verified against OpenRouter pricing where applicable
#   failover_to         documentation only — the adapter does NOT auto-retry.
#                       Orchestration layer decides retry per fail-fast doctrine.
#   notes               human context

default_endpoint: gemma4-local

endpoints:

  # ─── Primary local ────────────────────────────────────────────────────

  gemma4-local:
    base_url: http://127.0.0.1:8080/v1
    api_key_env: ""
    model: gemma4-dflash
    family: google
    api_style: openai_compatible
    active: true
    roles:
      - extractor                # Stage 2 bulk extraction (free, 120-220 tok/s)
      - tagger                   # Stage 2 marker-tag attachment
      - structurer               # Stage 2 population qualifier + units
      - legal_reviewer           # Stage 5
    timeout_s: 300
    default_max_tokens: 4096
    max_context: 16384            # 2026-05-26: bumped from 4096 — DFlash now launched with --max-ctx 16384
    supports_json_schema: true
    cost_per_million_in: 0
    cost_per_million_out: 0
    failover_to: deepseek-direct-chat
    hybrid_size_threshold_chars: 8000   # transcripts >= this go directly to failover_to (no Gemma attempt); tune after wave-0 data lands
    notes: |
      Gemma 4 26B-A4B (MoE, 128 experts, 8 active = 3.8B params/forward)
      via Lucebox DFlash speculative decoding on RTX 3090 Ti.

      Context window: 16384 tokens (DFlash --max-ctx 16384, set in
      /media/zoltan/4TSSD/lucebox-hub/start-dflash.sh line 46). VRAM
      ~21GB / 24GB available, ~3.5GB headroom. Sources >~14K input tokens
      (rare) must failover to deepseek-direct-chat which has 128K context.

      Target: /media/zoltan/4TSSD/lucebox-hub/dflash/models/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf (16 GB)
      Draft:  /media/zoltan/4TSSD/lucebox-hub/dflash/models/draft/gemma-4-26B-A4B-it-DFlash-q8_0.gguf (436 MB)
      Launch: /media/zoltan/4TSSD/lucebox-hub/start-dflash.sh (needs update for Gemma 4)

      Benchmarked 2026-05-26 on RTX 3090 Ti (with desktop compositor overhead):
        - Code generation: 115-125 tok/s
        - Structured extraction: 219 tok/s
        - All 8/8 claims correct on multi-marker Bikman fixture
      After Xorg moves to 5060 Ti (logout/login): expect ~30-50% more.

      Slug normalization caveat: outputs HOMA-IR / TG_HDL_ratio vs
      pipeline homa-ir / tg-hdl-ratio. Orchestrator must lowercase+hyphenate.

      Single-slot (concurrency=1). DFlash server does not support
      thinking/reasoning tokens — greedy decode only, which is correct
      for extraction tasks.

      Known quality limits at Q4_K_M (investigated 2026-05-26 against the
      apob/lpa/fasting-insulin fixture set):
        - Occasionally emits structurally invalid JSON for the Stage 2
          extractor prompt: unterminated strings, missing braces, raw
          newlines inside string values. ~5-15% failure rate on apob-class
          fixtures. NOT a sanitization issue — JSON is malformed at the
          token level, not just escape-level.
        - Hallucinates extraction_model field as 'gpt-4o' or similar
          (ignores the "<injected>" placeholder rule). Runner overwrites
          this field anyway, so it's cosmetic.
        - Verbatim quote drift on complex multi-clause content
          ("classified as 'high Lp(a)'" → "classified as high Lp(a)" —
          drops quotation marks, breaks byte-level grounding).
        - Mitigation: the hybrid_size_threshold_chars routes large
          transcripts directly to deepseek-direct-chat; run_extractor
          also falls back to the secondary on JSONDecodeError /
          jsonschema.ValidationError for small inputs. Net failure rate
          to caller after both mitigations: ~0% on the test set.
        - Possible future improvements (not in scope here):
          (a) try Q5 or Q6 quant (~4-8GB more VRAM)
          (b) explicit "JSON strings must be single-line; escape newlines"
              prompt nudge — try this if fallback rate becomes painful
          (c) different draft model for DFlash spec-decode

  qwen-local:
    base_url: http://127.0.0.1:8080/v1
    api_key_env: ""
    model: qwen
    family: qwen
    api_style: openai_compatible
    active: false
    roles: []
    timeout_s: 300
    default_max_tokens: 4096
    max_context: 8192
    supports_json_schema: true
    cost_per_million_in: 0
    cost_per_million_out: 0
    failover_to: qwen-mac
    notes: |
      DEMOTED 2026-05-26: replaced by gemma4-local (Lucebox DFlash).
      Gemma 4 26B-A4B is 3-6x faster on the same GPU and extraction
      quality is equivalent.

      Was: Qwen 3.6 27B UD-Q4_K_XL with MTP draft heads, ~35 tok/s.
      Also tested with Lucebox DFlash (80 tok/s headless) but Gemma 4
      MoE architecture is inherently faster without spec-decode, and
      DFlash on top pushes it to 120-220 tok/s.

      Can be reactivated on a different port if Qwen-family voice is
      needed for council diversity (currently not required — council
      uses DeepSeek / Google / OpenAI families).

  # ─── Local backup (Mac via tailnet) ───────────────────────────────────

  qwen-mac:
    base_url: http://100.119.217.94:8080/v1
    api_key_env: ""
    model: mlx-community/Qwen3.6-27B-OptiQ-4bit
    family: qwen
    api_style: openai_compatible
    active: true
    roles: [extractor_backup]
    timeout_s: 300
    default_max_tokens: 4096
    max_context: 8192
    supports_json_schema: true
    cost_per_million_in: 0
    cost_per_million_out: 0
    notes: |
      MacBook Pro MLX-LM. ~14 tok/s, no MTP. Tailnet 64ms RTT.
      Activated only on extractor failover (orchestrator decides — adapter
      does NOT auto-retry).

      ⚠ SECURITY (Codex review 2026-05-21): MLX-LM currently binds to
      0.0.0.0:8080 on the Mac, exposing it to anyone on the tailnet without
      auth. Tailscale ACL provides peer-level auth but not per-service.
      RECOMMENDED rebind on the Mac:
          mlx_lm.server --host 100.119.217.94 --port 8080 ...
      restricts to the tailnet interface only. See
      docs/agentic-workflow/REVIEW-2026-05-21-llm-access.md
      §11 for the rebind plan.

  # ─── Cloud council — minimum viable, three families ──────────────────

  dashscope-qwen-max:
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY
    model: qwen3.7-max
    family: qwen
    api_style: openai_compatible
    active: true
    roles: []                   # Stage 2 roles (tagger/structurer/legal_reviewer) moved to gemma4-local 2026-05-26
    timeout_s: 240
    default_max_tokens: 4096
    max_context: 262144
    supports_json_schema: true
    cost_per_million_in: 2.50
    cost_per_million_out: 7.50
    failover_for:
      - tagger                  # if gemma4-local is down, these roles fall back here
      - structurer
      - legal_reviewer
    notes: |
      Cloud fallback for Stage 2 roles now served by gemma4-local.

      2026-05-26: tagger/structurer/legal_reviewer moved to gemma4-local
      (Gemma 4 26B-A4B via Lucebox DFlash, 120-220 tok/s, $0/token).
      qwen-max stays as cloud failover if the local GPU is unavailable.

      History: REACTIVATED 2026-05-24. qwen3.7-max is the known-working
      DashScope model for Stage 2. The qwen3.6/qwen3-max alternatives
      returned 403 or failed content tests.

  dashscope-qwen3-max:
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY
    model: qwen3.6-max-preview
    family: qwen
    api_style: openai_compatible
    active: false
    roles: []
    timeout_s: 240
    default_max_tokens: 4096
    max_context: 128000
    supports_json_schema: true
    cost_per_million_in: 1.30
    cost_per_million_out: 7.80
    notes: |
      DEACTIVATED 2026-05-24. qwen3.6-max-preview returned 403 Access Denied;
      qwen3-max also returned 403. Keep only as documentation until access is
      granted.

  minimax-anthropic:
    base_url: https://api.minimax.io/anthropic
    api_key_env: MIMIMAX_TOKEN_PLAN   # note: env var name has a typo (MIMIMAX, not MINIMAX)
    model: MiniMax-M2.7-highspeed
    family: minimax                   # Chinese AI lab, independent of Alibaba/Moonshot/Zhipu
    api_style: anthropic              # supported via _AnthropicChatAdapter in code/llm_client.py
    active: false                     # DEMOTED 2026-05-25 — quality failures on lpa + non-determinism at temp=0
    roles: []                         # was [council_extractor]; see notes for evidence trail
    timeout_s: 240
    default_max_tokens: 4096
    max_context: 200000
    supports_json_schema: false       # Anthropic uses tool-use for structured output, not native json_schema
    cost_per_million_in: 0
    cost_per_million_out: 0
    cost_flat_monthly_usd: 80
    notes: |
      MiniMax flat-rate $80/mo "monthly plan" — Anthropic Messages API
      surface at https://api.minimax.io/anthropic/v1/messages.

      Verified live 2026-05-25:
        - Auth: x-api-key OR Authorization: Bearer (both accepted)
        - anthropic-version: 2023-06-01
        - Response shape: canonical Anthropic Messages
          (content: [{text, type}], usage with input_tokens /
          output_tokens / cache_creation_input_tokens /
          cache_read_input_tokens, stop_reason)
        - Latency: ~300 ms

      Plan quirk: every requested model is auto-routed to MiniMax-M2.7
      (M2.7-highspeed when selected as default via hermes dashboard).
      MiniMax-Text-01 and MiniMax-M1 return error 2061
      "your current token plan not support model". Any other model id
      (including claude-3-5-sonnet-20241022) is silently mapped to M2.7.
      Use M2.7-highspeed as the canonical model name.

      DEMOTED 2026-05-25 — council_extractor role moved to
      openrouter-deepseek-v4-flash. MiniMax anthropic adapter
      (api_style: anthropic) never landed in llm_client.py.
      Keep as documentation only; do not activate without completing
      the anthropic adapter branch + acceptance tests.

  openrouter-reviewer:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: google/gemini-2.5-flash
    family: google
    api_style: openai_compatible
    active: true
    roles: [council_reviewer]   # Stage-3 council voice #2 (Google family)
    timeout_s: 120
    default_max_tokens: 2048
    max_context: 1000000
    supports_json_schema: true
    cost_per_million_in: 0.30   # corrected per Codex review (was 0.075)
    cost_per_million_out: 2.50  # corrected per Codex review (was 0.30)
    notes: |
      Gemini 2.5 Flash via OpenRouter. Cheapest competent reviewer in the
      Google family. Ample 1M context. Reasoning lite (CoT-on-demand).
      Pricing verified against OpenRouter model page 2026-05-21.

  openrouter-decider:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: openai/gpt-5-mini
    family: openai
    api_style: openai_compatible
    active: true
    roles: [council_decider]    # Stage-3 council voice #3 (OpenAI family)
    timeout_s: 240
    default_max_tokens: 4096
    max_context: 400000
    min_output_tokens: 16
    supports_json_schema: true
    cost_per_million_in: 0.25
    cost_per_million_out: 2.00
    notes: |
      GPT-5 Mini via OpenRouter. Cheapest of the gpt-5 family with reasoning.
      Requires max_output_tokens >= 16 (OpenAI reserves capacity for internal
      reasoning). Promote to openai/gpt-5 (full) for contested markers, or
      anthropic/claude-opus-4.5 if OpenAI family disappoints.

  # ─── Reserve tier (active=false, no roles assigned) ──────────────────
  # Promote to a role by setting active=true and adding it to `roles:`.
  # No other code change needed.

  openrouter-claude-cheap:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: anthropic/claude-haiku-4.5
    family: anthropic
    api_style: openai_compatible
    active: false
    roles: []
    timeout_s: 120
    default_max_tokens: 2048
    cost_per_million_in: 1.00
    cost_per_million_out: 5.00
    notes: "Backup reviewer/decider — Anthropic family, fast tier."

  openrouter-claude-strong:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: anthropic/claude-opus-4.5
    family: anthropic
    api_style: openai_compatible
    active: false
    roles: []
    timeout_s: 300
    default_max_tokens: 4096
    cost_per_million_in: 15.00
    cost_per_million_out: 75.00
    notes: "Reserved for contested-marker re-adjudication. ~30x decider cost."

  openrouter-deepseek-r1:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: deepseek/deepseek-r1
    family: deepseek
    api_style: openai_compatible
    active: false
    roles: []
    timeout_s: 240
    default_max_tokens: 4096
    cost_per_million_in: 0.55
    cost_per_million_out: 2.19
    notes: "Fourth-family option for tiebreakers. Open-weight reasoning."

  deepseek-direct-chat:
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY     # sourced from ~/.secrets (must also be added to project secrets/.env for production Hermes runtime)
    model: deepseek-chat              # legacy alias = non-thinking V4 Flash (per deepseek docs footnote 1); explicit guarantee of 0 reasoning tokens
    family: deepseek
    api_style: openai_compatible
    active: true                      # Stage-3 council voice #1 (native DeepSeek API) + Stage-2 extractor failover
    roles: [council_extractor]        # 2026-05-29 — moved here onto the native DEEPSEEK_API_KEY (not OpenRouter) per user directive
    failover_for: [extractor]         # if gemma4-local is down, extractor falls back here
    timeout_s: 180
    default_max_tokens: 4096          # non-thinking model, no reasoning token burn
    max_context: 1000000              # 1M context per deepseek pricing page
    supports_json_schema: true
    cost_per_million_in: 0.14         # per deepseek pricing 2026-05-26 (cache miss)
    cost_per_million_in_cache_hit: 0.0028  # 50x cheaper for cached prompt prefixes
    cost_per_million_out: 0.28
    notes: |
      Direct DeepSeek API for Stage 2 bulk extraction.

      Why this and not OpenRouter route (openrouter-deepseek-v4-flash):
      OpenRouter's `deepseek/deepseek-v4-flash` alias defaults to thinking
      mode and provides no flag to disable it. Burned 4041/4096 output
      tokens on reasoning for lpa-size transcripts → empty visible output
      → 0-claim cold-start failures. Direct API exposes `deepseek-chat`
      as the explicit non-thinking V4 Flash, confirmed 0 reasoning tokens
      in smoke test 2026-05-26.

      Model alias mapping (per https://api-docs.deepseek.com pricing page):
        deepseek-chat       → V4-Flash non-thinking mode (this entry)
        deepseek-reasoner   → V4-Flash thinking mode
        deepseek-v4-flash   → new name, thinking is the default
        deepseek-v4-pro     → tier above, more reasoning, not used here

      Cost:
        - Cache miss: $0.14/M input + $0.28/M output
        - Cache hit:  $0.0028/M input (50x cheaper for the reused extractor
          system prompt — ~1.1K tokens per call × ~thousands of calls)
        - Net Stage 2 cost projection: ~$3 for full inventory (~11K sources)
          vs ~$450 on dashscope-qwen-max.

      Max output: 384K (per pricing page), so no max_tokens starvation
      concerns even on the largest transcripts.

      2026-05-29: council_extractor (Stage-3) moved here onto the native
      DeepSeek API (DEEPSEEK_API_KEY), off OpenRouter, per user directive —
      one DeepSeek account/key for both Stage-2 extraction and the Stage-3
      council voice. Uses deepseek-chat (non-thinking); switch model to
      deepseek-reasoner if thinking-mode re-verify is ever wanted. The
      OpenRouter DeepSeek route is retained as failover_for: [council_extractor].

  openrouter-deepseek-v4-flash:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: deepseek/deepseek-v4-flash
    family: deepseek
    api_style: openai_compatible
    active: true                                 # 2026-05-25 — 6/6 PASS on council fixtures (single-claim verify)
    roles: []                                    # 2026-05-29 — DEMOTED: council_extractor moved to deepseek-direct-chat (native DEEPSEEK_API_KEY, not OpenRouter) per user directive.
    failover_for: [council_extractor]            # native DeepSeek down -> fall back to the OpenRouter DeepSeek route
    timeout_s: 180
    default_max_tokens: 16384                    # raised 2026-05-26 — V4 Flash is a thinking model; 4096 starves reasoning + visible output on transcripts >10KB
    max_context: 128000
    supports_json_schema: true
    cost_per_million_in: 0.20    # estimated — verify against actual OpenRouter bills; reasoning tokens increase effective cost
    cost_per_million_out: 0.40   # estimated — verify against actual OpenRouter bills; reasoning tokens increase effective cost
    notes: |
      DeepSeek V4 Flash via OpenRouter — council_extractor as of 2026-05-25.
      Replaced dashscope-qwen-max for this role; qwen-max retains
      extractor/tagger/structurer/legal_reviewer (Stage 2 + Stage 5).

      Why a candidate:
        - 4th independent family (Chinese, separate from Alibaba/Moonshot/
          MiniMax) — satisfies §05 three-family invariant without leaning
          on Alibaba.
        - OpenRouter-routed: uses existing OPENROUTER_API_KEY, no new
          provider account to set up.
        - Flash tier ≈ 10x cheaper per token than qwen3.7-max
          ($0.20/$0.40 vs $2.50/$7.50 per M), and typically much faster.
        - Non-reasoning (unlike Kimi K2.6 thinking) — no max_tokens
          starvation risk.

      Quality gate (same as MiniMax / qwen-max comparison):
      Run code/acceptance/quality_check_council_extractor.py and confirm
      3/3 fixtures PASS (apob simple, lpa large-transcript numeric,
      fasting-insulin no-claim handling) with deterministic output at
      temperature=0 across two runs. Then promote to roles:
      [council_extractor] and demote dashscope-qwen-max.

  dashscope-deepseek-v4-pro:
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY
    model: deepseek-v4-pro
    family: deepseek
    api_style: openai_compatible
    active: false
    roles: []
    timeout_s: 240
    default_max_tokens: 4096
    supports_json_schema: true
    notes: |
      DeepSeek V4 Pro via Alibaba ModelStudio (Singapore workspace).
      Smoke-tested 2026-05-21 (returned the expected sentence, finish=stop).
      Fourth-family option for council tiebreakers or as a stronger swap for
      one of the current three voices if it underperforms. Pricing not yet
      pinned — record once first invoice lands.

  dashscope-deepseek-v4-flash:
    base_url: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY
    model: deepseek-v4-flash
    family: deepseek
    api_style: openai_compatible
    active: false
    roles: []
    timeout_s: 120
    default_max_tokens: 4096
    max_context: 128000
    supports_json_schema: true
    cost_per_million_in: 0.30
    cost_per_million_out: 1.10
    notes: |
      DEACTIVATED 2026-05-24. Failed model identity test - claimed to be
      "gpt-4o-2024-08-06" when it's actually deepseek-v4-flash. This is a
      data integrity violation. Switched to Kimi K2.6 instead.

  openrouter-kimi:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    model: moonshotai/kimi-k2.6
    family: moonshot
    api_style: openai_compatible
    active: false
    roles: []
    timeout_s: 240
    default_max_tokens: 4096
    max_context: 262144
    cost_per_million_in: 0.60
    cost_per_million_out: 2.50
    notes: |
      DEACTIVATED 2026-05-24. Failed on OpenRouter — returned empty content
      with finish_reason=stop after 100s. Likely a "thinking" model that
      isn't properly exposing content through the OpenAI-compatible endpoint.
      Direct moonshot.ai API key is also invalid. Switched to qwen3-max.

